name: sidestack
description: Track your side hustles and small businesses.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.1

  # Local storage (replaces Firebase for now — easy to swap later)
  shared_preferences: ^2.2.2
  uuid: ^4.3.3

  # Charts
  fl_chart: ^0.67.0

  # Date formatting
  intl: ^0.19.0

  # Icons
  cupertino_icons: ^1.0.6

  # Smooth page transitions
  go_router: ^13.2.0
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  cloud_firestore: ^6.2.0
  google_sign_in: ^7.2.0
  sign_in_with_apple: ^6.1.3
  firebase_messaging: ^16.1.3
  flutter_local_notifications: ^18.0.1
  firebase_storage: ^13.2.0
  image_picker: ^1.1.2
  share_plus: ^10.0.0
  path_provider: ^2.1.2
  local_auth: ^2.3.0
  pdf: ^3.10.8
  printing: ^5.12.0
  file_picker: ^8.1.2
  purchases_flutter: ^8.0.0
  cloud_functions: ^6.1.0
  url_launcher: ^6.2.5
  app_links: ^6.3.2
  firebase_app_check: ^0.4.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  fonts:
    - family: Sora
      fonts:
        - asset: assets/fonts/Sora-Regular.ttf
          weight: 400
        - asset: assets/fonts/Sora-Medium.ttf
          weight: 500
        - asset: assets/fonts/Sora-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Sora-Bold.ttf
          weight: 700
  assets:
    - assets/fonts/
    - assets/logo_white.png
    - assets/logo_navy.png
    - assets/logo_teal.png
    - assets/icon.png
    - assets/icon_ios.png
    - assets/icon_adaptive_fg.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon_ios.png"
  image_path_ios: "assets/icon_ios.png"
  remove_alpha_ios: true
  min_sdk_android: 21
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icon_adaptive_fg.png"
